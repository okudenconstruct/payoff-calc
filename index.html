<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payoff Calculator · Capital One VentureOne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface-alt: #fbfaf7;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --text-dim: #6b6b6b;
    --green: #1D9E75;
    --red: #E24B4A;
    --highlight-bg: rgba(29,158,117,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-alt: #2a2a2a;
      --border: rgba(255,255,255,0.08);
      --text: #f0eeea;
      --text-dim: #9a9a9a;
      --highlight-bg: rgba(29,158,117,0.12);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header {
    margin-bottom: 28px;
  }
  header .card-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  header .balance-amount {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 36px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  header .balance-meta {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .num {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
  }
  .sliders {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .slider-row + .slider-row {
    margin-top: 18px;
  }
  .slider-row label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .slider-row label .val {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    margin: 6px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    border: none;
    transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.1);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    border: none;
  }
  input[type="range"]::-moz-range-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    border: none;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 12px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.3;
    margin-bottom: 8px;
    min-height: 32px;
  }
  .stat-value {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.1;
  }
  .stat-value.savings {
    color: var(--green);
  }
  .comparison {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .compare-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: left;
  }
  .compare-col.highlighted {
    border-color: var(--green);
    border-width: 1.5px;
    background: var(--highlight-bg);
  }
  .compare-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .compare-time {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .compare-interest {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--text-dim);
  }
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px 20px;
    margin-bottom: 16px;
  }
  .custom-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .legend-square {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    display: inline-block;
  }
  .legend-square.red { background: var(--red); }
  .legend-square.green { background: var(--green); }
  .chart-wrap {
    height: 240px;
    position: relative;
  }
  .pitch {
    background: var(--highlight-bg);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 28px;
  }
  .pitch strong {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-weight: 500;
    color: var(--green);
  }
  footer {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.5;
  }
  @media (max-width: 500px) {
    main {
      padding: 24px 14px 40px;
    }
    .stats {
      grid-template-columns: repeat(2, 1fr);
    }
    .stat-label {
      min-height: 0;
    }
    .comparison {
      grid-template-columns: 1fr;
    }
    .stat-value {
      font-size: 20px;
    }
  }
</style>
</head>
<body>
<main>
  <header>
    <div class="card-name">Capital One VentureOne · 7603 · payoff calculator</div>
    <div class="balance-amount">$5,304.64</div>
    <div class="balance-meta">current balance · 24.49% APR</div>
  </header>

  <section class="sliders">
    <div class="slider-row">
      <label>
        <span>Lump sum today</span>
        <span class="val" id="lumpValue">$0</span>
      </label>
      <input type="range" id="lump" min="0" max="5000" step="50" value="0">
    </div>
    <div class="slider-row">
      <label>
        <span>Monthly payment</span>
        <span class="val" id="monthlyValue">$300</span>
      </label>
      <input type="range" id="monthly" min="161" max="1000" step="25" value="300">
    </div>
  </section>

  <section class="stats">
    <div class="stat">
      <div class="stat-label">Interest charged this month</div>
      <div class="stat-value" id="interestMonth">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Payoff timeline</div>
      <div class="stat-value" id="payoffTime">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total interest paid</div>
      <div class="stat-value" id="totalInterest">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Interest saved vs. minimum</div>
      <div class="stat-value savings" id="interestSaved">$0</div>
    </div>
  </section>

  <section class="comparison">
    <div class="compare-col">
      <div class="compare-label">Minimum payments</div>
      <div class="compare-time" id="minTime">—</div>
      <div class="compare-interest" id="minInterest">—</div>
    </div>
    <div class="compare-col highlighted">
      <div class="compare-label">Your plan</div>
      <div class="compare-time" id="yourTime">—</div>
      <div class="compare-interest" id="yourInterest">—</div>
    </div>
    <div class="compare-col">
      <div class="compare-label">$500/mo fixed</div>
      <div class="compare-time" id="fixedTime">—</div>
      <div class="compare-interest" id="fixedInterest">—</div>
    </div>
  </section>

  <section class="chart-section">
    <div class="custom-legend">
      <span class="legend-item"><span class="legend-square red"></span>Minimum payments</span>
      <span class="legend-item"><span class="legend-square green"></span>Your plan</span>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </section>

  <div class="pitch" id="pitch"></div>

  <footer>
    For informational use only
  </footer>
</main>

<script>
  const STARTING_BALANCE = 5304.64;
  const APR = 0.2449;
  const MONTHLY_RATE = APR / 12;
  const MAX_MONTHS = 720;
  const CHART_CAP = 300;

  function simulateMin(start) {
    let balance = start;
    let totalInterest = 0;
    let totalPaid = 0;
    let months = 0;
    const series = [balance];
    while (balance >= 0.01 && months < MAX_MONTHS) {
      const interest = balance * MONTHLY_RATE;
      const minPayment = Math.max(25, balance * 0.01 + interest);
      const payment = Math.min(minPayment, balance + interest);
      balance = balance + interest - payment;
      totalInterest += interest;
      totalPaid += payment;
      months++;
      series.push(Math.max(balance, 0));
    }
    return { months, totalInterest, totalPaid, series };
  }

  function simulateFixed(start, lump, monthly) {
    let balance = Math.max(0, start - lump);
    let totalInterest = 0;
    let totalPaid = lump;
    let months = 0;
    const series = [balance];
    if (balance < 0.01) {
      return { months: 0, totalInterest: 0, totalPaid: lump, series, paidOff: true };
    }
    while (balance >= 0.01 && months < MAX_MONTHS) {
      const interest = balance * MONTHLY_RATE;
      const payment = Math.min(monthly, balance + interest);
      balance = balance + interest - payment;
      totalInterest += interest;
      totalPaid += payment;
      months++;
      series.push(Math.max(balance, 0));
    }
    return { months, totalInterest, totalPaid, series };
  }

  function fmtTime(months) {
    if (months === 0) return 'Paid off!';
    if (months >= MAX_MONTHS) return '60+ yr';
    if (months < 12) return months + ' mo';
    const y = Math.floor(months / 12);
    const m = months % 12;
    if (m === 0) return y + ' yr';
    return y + ' yr ' + m + ' mo';
  }

  function fmtMoney(n) {
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function fmtMoney2(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function getCSS(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  let chart = null;

  function buildChart(minSeries, yourSeries) {
    const len = Math.min(CHART_CAP + 1, Math.max(minSeries.length, yourSeries.length));
    const labels = [];
    for (let i = 0; i < len; i++) labels.push(i);

    const minData = [];
    const yourData = [];
    for (let i = 0; i < len; i++) {
      minData.push(i < minSeries.length ? minSeries[i] : null);
      yourData.push(i < yourSeries.length ? yourSeries[i] : null);
    }

    const textDim = getCSS('--text-dim') || '#6b6b6b';
    const border = getCSS('--border') || 'rgba(0,0,0,0.08)';
    const red = getCSS('--red') || '#E24B4A';
    const green = getCSS('--green') || '#1D9E75';

    const data = {
      labels: labels,
      datasets: [
        {
          label: 'Minimum payments',
          data: minData,
          borderColor: red,
          backgroundColor: 'transparent',
          borderDash: [5, 4],
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.15,
          spanGaps: false,
        },
        {
          label: 'Your plan',
          data: yourData,
          borderColor: green,
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.15,
          spanGaps: false,
        },
      ],
    };

    const options = {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.85)',
          titleFont: { family: "'DM Sans'", size: 12 },
          bodyFont: { family: "'DM Mono'", size: 12 },
          padding: 10,
          callbacks: {
            title: function (items) {
              const m = items[0].label;
              const n = parseInt(m, 10);
              if (n === 0) return 'Now';
              if (n < 12) return n + ' mo';
              const y = Math.floor(n / 12);
              const mo = n % 12;
              return mo === 0 ? y + ' yr' : y + ' yr ' + mo + ' mo';
            },
            label: function (ctx) {
              if (ctx.parsed.y === null) return null;
              return ctx.dataset.label + ': $' + Math.round(ctx.parsed.y).toLocaleString('en-US');
            },
          },
        },
      },
      scales: {
        x: {
          grid: { color: border, drawTicks: false },
          ticks: {
            color: textDim,
            font: { family: "'DM Sans'", size: 11 },
            autoSkip: false,
            maxRotation: 0,
            callback: function (val, idx) {
              const m = this.getLabelForValue(val);
              const n = parseInt(m, 10);
              if (n === 0) return 'Now';
              if (n % 12 === 0) return 'Yr ' + (n / 12);
              return '';
            },
          },
        },
        y: {
          beginAtZero: true,
          grid: { color: border, drawTicks: false },
          ticks: {
            color: textDim,
            font: { family: "'DM Mono'", size: 11 },
            callback: function (v) {
              if (v === 0) return '$0';
              if (v >= 1000) return '$' + (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1) + 'k';
              return '$' + v;
            },
          },
        },
      },
    };

    if (chart) {
      chart.data = data;
      chart.options = options;
      chart.update('none');
    } else {
      chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: data,
        options: options,
      });
    }
  }

  function buildPitch(lump, monthly, minResult, yourResult) {
    const interestSaved = minResult.totalInterest - yourResult.totalInterest;
    const months = yourResult.months;
    const monthsText = fmtTime(months);

    if (yourResult.paidOff) {
      return 'Lump sum covers the full balance — debt is wiped out today and you avoid <strong>' + fmtMoney(minResult.totalInterest) + '</strong> in future interest.';
    }

    if (lump === 0 && monthly <= 200) {
      const drainPerMonth = STARTING_BALANCE * MONTHLY_RATE;
      return 'At this pace, payoff takes <strong>' + monthsText + '</strong> and the card quietly drains about <strong>' + fmtMoney2(drainPerMonth) + '</strong> in interest every month. Bumping the monthly payment is the fastest lever you have.';
    }

    if (lump > 0 && interestSaved > 0) {
      const returnPct = Math.round((interestSaved / lump) * 100);
      return 'A <strong>' + fmtMoney(lump) + '</strong> payment today generates a guaranteed <strong>' + returnPct + '%</strong> return by eliminating future interest — better than any savings account. Total payoff in <strong>' + monthsText + '</strong>.';
    }

    return 'Plan pays off in <strong>' + monthsText + '</strong> with <strong>' + fmtMoney(yourResult.totalInterest) + '</strong> total interest, saving <strong>' + fmtMoney(interestSaved) + '</strong> versus paying the minimum.';
  }

  const lumpEl = document.getElementById('lump');
  const monthlyEl = document.getElementById('monthly');
  const lumpValEl = document.getElementById('lumpValue');
  const monthlyValEl = document.getElementById('monthlyValue');

  function update() {
    const lump = parseFloat(lumpEl.value);
    const monthly = parseFloat(monthlyEl.value);

    lumpValEl.textContent = fmtMoney(lump);
    monthlyValEl.textContent = fmtMoney(monthly);

    const minResult = simulateMin(STARTING_BALANCE);
    const yourResult = simulateFixed(STARTING_BALANCE, lump, monthly);
    const fixedResult = simulateFixed(STARTING_BALANCE, 0, 500);

    document.getElementById('interestMonth').textContent = fmtMoney2(STARTING_BALANCE * MONTHLY_RATE);
    document.getElementById('payoffTime').textContent = fmtTime(yourResult.months);
    document.getElementById('totalInterest').textContent = fmtMoney(yourResult.totalInterest);

    const saved = Math.max(0, minResult.totalInterest - yourResult.totalInterest);
    document.getElementById('interestSaved').textContent = fmtMoney(saved);

    document.getElementById('minTime').textContent = fmtTime(minResult.months);
    document.getElementById('minInterest').textContent = fmtMoney(minResult.totalInterest) + ' interest';

    document.getElementById('yourTime').textContent = fmtTime(yourResult.months);
    document.getElementById('yourInterest').textContent = fmtMoney(yourResult.totalInterest) + ' interest';

    document.getElementById('fixedTime').textContent = fmtTime(fixedResult.months);
    document.getElementById('fixedInterest').textContent = '~' + fmtMoney(fixedResult.totalInterest) + ' interest';

    document.getElementById('pitch').innerHTML = buildPitch(lump, monthly, minResult, yourResult);

    buildChart(minResult.series, yourResult.series);
  }

  lumpEl.addEventListener('input', update);
  monthlyEl.addEventListener('input', update);

  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', update);
  }

  update();
</script>
</body>
</html>
